# Site configuration — edit this file to rebrand your instance.

name: "OpenLex"
base_url: "https://openlex.vercel.app"
default_locale: "de"

# ISR revalidation, sharing, export, analytics, related content display
# are all under features. Omit a key to disable that feature.
branding:
  tagline:
    de: "Open-Access-Plattform für juristische Fachliteratur"
    en: "Open-access platform for legal literature"
  # oklch hue (0–360) — drives the entire color palette
  brand_hue: 265
  # Footer — flat list of items, displayed left to right, separated by ·
  # Types: text (plain text), license (CC badge), slug (local markdown page), href (external link)
  footer:
    - license
    - slug: impressum
      label: { de: "Impressum", en: "Imprint" }
    - slug: datenschutz
      label: { de: "Datenschutz", en: "Privacy Policy" }
    - href: "https://github.com/openlex-project/openlex"
      label: { de: "GitHub", en: "GitHub" }

# Content repositories — GitHub or GitLab repos containing books, journals, or laws.
# Format: github://org/repo, gitlab://group/project, gitlab://host/group/project (self-hosted)
content_repos:
  - github://openlex-project/openlex-demo-commentary
  - github://openlex-project/openlex-demo-law

# Content categories — controls homepage sections and /category/[key] pages.
categories:
  - key: book
    label: { de: "Kommentare & Bücher", en: "Commentaries & Books" }
  - key: journal
    label: { de: "Zeitschriften", en: "Journals" }
  - key: law
    label: { de: "Gesetze", en: "Laws" }

features:
  # Social sharing targets — order = display order in dropdown. Omit to disable.
  sharing:
    - copy
    - email
    - x
    - linkedin
    - whatsapp

  # Export settings — omit to disable export entirely.
  export:
    formats:
      - md
      - docx
    require_auth: true

  # How to display related content links: "badge" (default) or "sidebar".
  related_content_display: badge

  # Analytics provider: vercel | plausible | matomo | umami | goatcounter. Omit to disable.
  analytics:
    provider: vercel

  # ISR revalidation interval in seconds (default: 3600).
  # Set to false to disable periodic refetch (use deploy hooks instead).
  revalidate: false

  # Rate limit for export API (requests per minute per user, default: 60).
  rate_limit: 30
